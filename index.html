<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Dev Agency Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script>
        const saved = localStorage.getItem("color-scheme");
        if (saved) {
            document.querySelector('meta[name="color-scheme"]').content = saved;
            document.documentElement.setAttribute("data-theme", saved);
        }
    </script>
</head>
<body>
    <!-- 1. Navigation Bar -->
    <nav class="navbar navbar-expand-sm sticky-top" id="navbar">
        <div class="container-xl">
            <!-- Logo -->
            <a class="navbar-brand" href="#" id="logo">
                <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
                <span>Dev Agency</span>
            </a>
            <!-- Hamburger Button (Mobile Only) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarLinks"
                aria-controls="navbarLinks" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Nav Links (Desktop Only -->
            <div class="collapse navbar-collapse" id="navbarLinks">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                    <li class="nav-item"><a class="nav-link" href="#hero">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#team">Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="#showcase">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                    <li class="nav-item">
                        <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" id="theme-toggle"
                            aria-label="Toggle dark/light mode">
                            <span id="theme-icon">&#9788;</span> <span id="theme-text">Light</span>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- 2. Hero Section -->
    <header class="hero-section" id="hero">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center">
                    <h1 class="mb-3">We Build Modern Digital Experiences</h1>
                    <p class="lead text-muted mb-4">
                        A highly-skilled development collective delivering high-performance,
                        accessible, and stunning interfaces. Driven by native web technologies.
                    </p>
                    <a href="#showcase" class="btn btn-primary rounded-pill px-4 py-2">
                        Explore Out Work <span>&rarr;</span>
                    </a>
                </div>
            </div>
        </div>
    </header>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
